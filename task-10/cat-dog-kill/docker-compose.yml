version: '3.8'

services:
  # Backend Server
  server:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - MONGODB_URI=mongodb://mongo:27017/cat-dog-kill
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - JWT_SECRET=${JWT_SECRET:-change-this-secret-in-production}
      - CORS_ORIGIN=*
    depends_on:
      - mongo
      - redis
    networks:
      - cat-dog-kill-network
    restart: unless-stopped

  # MongoDB
  mongo:
    image: mongo:6
    container_name: cat-dog-kill-mongo
    environment:
      - MONGO_INITDB_DATABASE=cat-dog-kill
    volumes:
      - mongo-data:/data/db
    networks:
      - cat-dog-kill-network
    restart: unless-stopped

  # Redis
  redis:
    image: redis:7-alpine
    container_name: cat-dog-kill-redis
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    networks:
      - cat-dog-kill-network
    restart: unless-stopped

networks:
  cat-dog-kill-network:
    driver: bridge

volumes:
  mongo-data:
  redis-data:
